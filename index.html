<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Survivor Journeys — Crestwood Oral History Project</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <meta name="description" content="An interactive memorial map following the journeys of
    Holocaust survivors who shared their stories with Crestwood students — from their
    hometowns, through the ghettos and camps, to new lives in Toronto." />
  <meta property="og:title" content="Survivor Journeys — Crestwood Oral History Project" />
  <meta property="og:description" content="Follow the journeys of Holocaust survivors
    across Europe — one life at a time, then all of them at once." />

  <link rel="preload" href="vendor/fonts/spectral-500.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="vendor/fonts/public-sans-400.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to the map</a>

  <div id="stage">
    <!-- persistent vector map -->
    <div id="map" tabindex="-1" role="application" aria-label="Map of survivor journeys" main></div>
    <div id="tip" class="tip" aria-hidden="true"></div>

    <!-- loading / error -->
    <div id="loading" class="cover">
      <div class="cover-inner">
        <span class="spinner" aria-hidden="true"></span>
        <p class="serif">Drawing the map…</p>
      </div>
    </div>
    <div id="error" class="cover" hidden>
      <div class="cover-inner">
        <p class="serif lg">The map could not load.</p>
        <p class="muted">A connection is needed to draw the basemap the first time. Please
          reload when you are back online.</p>
      </div>
    </div>

    <!-- top bar -->
    <header id="topbar" class="topbar" hidden>
      <button class="brand" data-act="home" title="Back to the start">
        <span class="brand-title">Journeys</span>
        <span class="brand-kicker">Crestwood OHP</span>
      </button>
      <nav class="nav" role="tablist" aria-label="View modes">
        <button class="nav-tab" role="tab" data-view="guided" title="Follow one person's journey as a scrolling story">Guided<span class="nav-underline"></span></button>
        <button class="nav-tab" role="tab" data-view="explore" title="Everyone as points — search and filter by community, click anyone">Explore<span class="nav-underline"></span></button>
        <button class="nav-tab" role="tab" data-view="patterns" title="Every journey at once, plus where people came from">Patterns<span class="nav-underline"></span></button>
      </nav>
      <div class="topbar-right">
        <span id="status-pill" class="status-pill" title="Journeys are auto-extracted from public archive summaries and are pending human verification — not authoritative.">
          <span class="status-dot"></span><span class="status-text">Pending review</span>
        </span>
        <button class="nav-plain" data-view="about">About</button>
      </div>
    </header>

    <!-- overlay (filled per view) -->
    <div id="overlay"></div>
  </div>

  <p id="fatal" class="fatal" hidden role="alert"></p>

  <script src="vendor/d3/d3.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
