# Cloudflare Worker config (doc 09 Part 2 — auto-update native to Cloudflare).
#
# Deploys with NO manual setup: a [build] step assembles a clean ./public site
# (the committed 221-survivor dataset included) and the Worker serves it. The
# KV-backed auto-update is an opt-in enhancement — see "Enabling auto-update".
#
# Cloudflare Workers Builds runs `npx wrangler deploy` on push to main; wrangler runs
# the [build] command first. The Worker name must match the Cloudflare project.

name = "ohpmap"
main = "worker/index.js"
compatibility_date = "2024-11-01"

# Assemble only the static site into ./public (keeps .git, tooling, and source out of
# what's served — see tools/assemble_site.cjs).
[build]
command = "node tools/assemble_site.cjs"

# Serve ./public as static assets. run_worker_first lets the Worker own the dataset
# route so it can serve the warm KV cache when one is configured (falling back to the
# committed file otherwise).
[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = ["/data/survivors.geojson", "/__sync"]

# Daily rebuild at 06:00 UTC (Cron on Workers is always UTC). The scheduled handler
# no-ops unless a KV namespace is bound, so this is safe with no setup.
[triggers]
crons = ["0 6 * * *"]

# ── Enabling auto-update (optional) ──────────────────────────────────────────
# 1. Create a namespace:   npx wrangler kv namespace create OHP_DATA
# 2. Uncomment the binding below and paste the printed id.
# 3. Redeploy. The cron then refreshes the dataset into KV and the Worker serves it.
#
# [[kv_namespaces]]
# binding = "OHP_DATA"
# id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"
