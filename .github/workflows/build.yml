name: build-and-validate

# CI for the data pipeline (doc 02 section 8 / F12). Deployment is handled by
# Cloudflare Workers Builds (wrangler deploy on push — see wrangler.toml / worker/),
# so this workflow only builds and validates; it does not deploy.
#  - push:                validate on every change to main
#  - schedule:            weekly rebuild from the source of truth
#  - workflow_dispatch:   a manual "rebuild now" button
#  - repository_dispatch: fired by a WordPress publish webhook (type: ohp-publish)
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  repository_dispatch:
    types: [ohp-publish]

permissions:
  contents: write

concurrency:
  group: ohp-ci
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run tests (the build cannot ship bad data)
        run: python -m pytest -q

      - name: Rebuild dataset
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Default rebuilds the real dataset from the committed scrape artifact
          # (data/source/ohp_scraped.json) + curated featured survivors — fully offline
          # and reproducible. To re-pull from the live archive, run first:
          #   python -m pipeline.scrape_ohp --refresh
          # and to use the LLM extractor instead of the offline one, add:
          #   --extractor anthropic
          python -m pipeline.build

      - name: Assemble the static site (smoke check that it builds cleanly)
        run: node tools/assemble_site.cjs

      - name: Commit regenerated data (scheduled / dispatch runs only)
        if: github.event_name != 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/survivors.geojson data/review || true
          if ! git diff --cached --quiet; then
            git commit -m "data: scheduled rebuild [skip ci]"
            git push
          else
            echo "No data changes."
          fi
